<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" style="font-family:Inter,sans-serif">
  <!-- Background -->
  <rect width="800" height="560" fill="#0a0f1e"/>
  <rect x="1" y="1" width="798" height="558" fill="none" stroke="#0ea5e9" stroke-width="2" rx="12"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="768" height="528" fill="none" stroke="#0ea5e9" stroke-width="0.5" stroke-dasharray="6,4" rx="8" opacity="0.4"/>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="800" height="6" fill="#0ea5e9" rx="3"/>
  <!-- Deloitte wordmark area -->
  <rect x="30" y="30" width="160" height="50" rx="8" fill="#0ea5e9" opacity="0.15"/>
  <text x="110" y="62" font-size="22" font-weight="800" fill="#0ea5e9" text-anchor="middle" letter-spacing="2">DELOITTE</text>
  <!-- Forage badge -->
  <rect x="620" y="30" width="150" height="50" rx="8" fill="#1e2d4a"/>
  <text x="695" y="52" font-size="11" fill="#94a3b8" text-anchor="middle">Powered by</text>
  <text x="695" y="68" font-size="14" font-weight="700" fill="#38bdf8" text-anchor="middle">FORAGE</text>
  <!-- Certificate title -->
  <text x="400" y="150" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="4" font-weight="500">CERTIFICATE OF COMPLETION</text>
  <!-- Decorative line -->
  <line x1="200" y1="165" x2="600" y2="165" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
  <!-- Main title -->
  <text x="400" y="220" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle">Data Analytics</text>
  <text x="400" y="258" font-size="30" font-weight="800" fill="#0ea5e9" text-anchor="middle">Job Simulation</text>
  <!-- Awarded to -->
  <text x="400" y="310" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="2">AWARDED TO</text>
  <text x="400" y="350" font-size="26" font-weight="700" fill="#e2e8f0" text-anchor="middle">Pratham Raval</text>
  <!-- Decorative underline -->
  <line x1="280" y1="362" x2="520" y2="362" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <!-- Description -->
  <text x="400" y="400" font-size="12" fill="#64748b" text-anchor="middle">For successfully completing all tasks in the</text>
  <text x="400" y="418" font-size="12" fill="#64748b" text-anchor="middle">Deloitte Data Analytics Virtual Experience Program</text>
  <!-- Year -->
  <text x="400" y="460" font-size="13" fill="#0ea5e9" text-anchor="middle" font-weight="600">2024</text>
  <!-- Corner decorations -->
  <circle cx="50" cy="510" r="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <circle cx="50" cy="510" r="12" fill="#0ea5e9" opacity="0.1"/>
  <circle cx="750" cy="510" r="20" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.3"/>
  <circle cx="750" cy="510" r="12" fill="#0ea5e9" opacity="0.1"/>
  <!-- Bottom text -->
  <text x="400" y="530" font-size="10" fill="#334155" text-anchor="middle">Deloitte × Forage Virtual Experience Program · Certificate ID: DA-2024-PR</text>
</svg>
